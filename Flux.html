<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeoGroups</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0d12;
    color:white;
    display:flex;
    height:100vh;
}

.sidebar {
    width:280px;
    background:#151a23;
    padding:10px;
}

.chat {
    flex:1;
    display:flex;
    flex-direction:column;
}

.messages {
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.msg {
    padding:8px;
    margin:5px;
    border-radius:10px;
    max-width:70%;
}

.me {
    background:#4f7cff;
    margin-left:auto;
}

.other {
    background:#222a3a;
}

.small {
    font-size:11px;
    color:gray;
}

.input {
    display:flex;
    padding:10px;
    background:#151a23;
}

input {
    flex:1;
    padding:10px;
    background:#0b0d12;
    border:1px solid #333;
    color:white;
}

button {
    margin-left:5px;
    background:#4f7cff;
    border:none;
    color:white;
    padding:10px;
}

.group {
    padding:5px;
    cursor:pointer;
    border-bottom:1px solid #222;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Groups</h3>

<input id="groupName" placeholder="New group">
<button onclick="createGroup()">Create</button>

<div id="groups"></div>
</div>

<div class="chat">

<div class="messages" id="chat"></div>

<div class="input">
<input id="msg" placeholder="message">
<button onclick="send()">Send</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let currentGroup = null;
let myName = prompt("nickname");
let pass = prompt("password");

socket.emit("login", { nickname: myName, password: pass });

socket.on("groupsList", (list) => {
    groups.innerHTML = list.map(g =>
        `<div class="group" onclick="openGroup('${g.id}')">
            ${g.name} (${g.members.length})
        </div>`
    ).join("");
});

socket.on("groupMessages", (msgs) => {
    chat.innerHTML = "";
    msgs.forEach(renderMsg);
});

socket.on("newMessage", ({ groupId, message }) => {
    if (groupId === currentGroup)
        renderMsg(message);
});

function createGroup() {
    socket.emit("createGroup", groupName.value);
}

function openGroup(id) {
    currentGroup = id;
    socket.emit("joinGroup", id);
}

function send() {
    if (!currentGroup) return;

    socket.emit("groupMessage", {
        groupId: currentGroup,
        text: msg.value
    });

    msg.value = "";
}

function renderMsg(m) {
    const isMe = m.from === myName;

    const div = document.createElement("div");
    div.className = "msg " + (isMe ? "me" : "other");

    div.innerHTML = `
        <b>${m.from}</b><br>
        ${m.text}
        <div class="small">
            ${m.status.read ? "read ✓✓" : "sent ✓"}
        </div>
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    // отметить как прочитано
    socket.emit("readMessage", {
        groupId: currentGroup,
        messageId: m.id
    });
}
</script>

</body>
</html>
