<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Chat</title>

<style>
body {
    font-family: Arial;
    background:#0b0d12;
    color:white;
    padding:20px;
}

input {
    padding:10px;
    margin:5px;
    background:#151a23;
    border:1px solid #333;
    color:white;
}

button {
    padding:10px;
    background:#4f7cff;
    border:none;
    color:white;
}

.box {
    margin-bottom:20px;
    padding:10px;
    background:#151a23;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
<h3>Register / Login</h3>

<input id="nick" placeholder="nickname">
<input id="pass" type="password" placeholder="password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div class="box">
<h3>Find user</h3>

<input id="search" placeholder="nickname">
<button onclick="findUser()">Search</button>

<div id="result"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function register() {
    socket.emit("register", {
        nickname: nick.value,
        password: pass.value
    });
}

function login() {
    socket.emit("login", {
        nickname: nick.value,
        password: pass.value
    });
}

function findUser() {
    socket.emit("findUser", search.value);
}

socket.on("authSuccess", (m) => alert(m));
socket.on("authError", (m) => alert(m));

socket.on("userFound", (u) => {
    result.innerHTML = `
        <p><b>${u.nickname}</b></p>
        <p>${u.exists ? "exists" : "not found"}</p>
        <p>${u.isOnline ? "online 🟢" : "offline ⚫"}</p>
    `;
});
</script>

</body>
</html>
